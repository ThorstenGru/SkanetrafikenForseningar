name: Deploy pages (dashboard + compensation + claims)

on:
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: skanetrafiken-deploy
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore stop_times cache
        # This workflow never refreshes the static index itself, so unlike
        # scan.yml/backfill.yml there's nothing to save afterward -- just a
        # restore to make the cache available to build_claims.py.
        continue-on-error: true
        uses: actions/cache/restore@v4
        with:
          path: data/stop_times_cache.sqlite
          key: stop-times-${{ hashFiles('data/static_index.sqlite') }}
          restore-keys: stop-times-

      - name: Build content pages
        uses: ./.github/actions/build-content-pages
        with:
          database-url: ${{ secrets.DATABASE_URL }}
          sommarbiljett-purchased-at: ${{ secrets.SOMMARBILJETT_PURCHASED_AT }}
          supabase-anon-key: ${{ secrets.SUPABASE_ANON_KEY }}
          claim-tracking-passphrase: ${{ secrets.CLAIM_TRACKING_PASSPHRASE }}

      - uses: actions/upload-pages-artifact@v3
        with:
          path: pages_site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
