name: Deploy pages (dashboard + compensation + claims)

on:
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: skanetrafiken-deploy
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build content pages
        uses: ./.github/actions/build-content-pages
        with:
          database-url: ${{ secrets.DATABASE_URL }}
          sommarbiljett-purchased-at: ${{ secrets.SOMMARBILJETT_PURCHASED_AT }}
          supabase-anon-key: ${{ secrets.SUPABASE_ANON_KEY }}
          claim-tracking-passphrase: ${{ secrets.CLAIM_TRACKING_PASSPHRASE }}

      - uses: actions/upload-pages-artifact@v3
        with:
          path: pages_site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
