name: Backfill historical data (KoDa)

on:
  workflow_dispatch:
    inputs:
      days:
        description: "How many days back to backfill (ending yesterday). Ignored if start is set."
        default: "32"
      interval_hours:
        description: "Sampling cadence in hours, matching the live scan cadence. Accepts fractions (e.g. 0.25 for 15 min)."
        default: "2"
      start:
        description: "YYYY-MM-DD — overrides days, backfills an explicit range instead of 'N days ending yesterday'"
        default: ""
      end:
        description: "YYYY-MM-DD — only used together with start; defaults to yesterday if start is set but end isn't"
        default: ""

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: skanetrafiken-backfill
  cancel-in-progress: false

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Backfill from KoDa historical archive
        # Leaves ~50 of the job's 350-min budget for the remaining steps.
        # Without this, a stalled KoDa endpoint could consume the entire
        # job timeout and die before committing/publishing anything at all,
        # with no earlier, cheaper failure signal.
        timeout-minutes: 300
        env:
          TRAFIKLAB_STATIC_KEY: ${{ secrets.TRAFIKLAB_STATIC_KEY }}
          KODA_API_KEY: ${{ secrets.KODA_API_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          START: ${{ github.event.inputs.start }}
          END: ${{ github.event.inputs.end }}
          DAYS: ${{ github.event.inputs.days }}
          INTERVAL_HOURS: ${{ github.event.inputs.interval_hours }}
        run: |
          if [ -n "$START" ]; then
            ARGS="--start $START --interval-hours $INTERVAL_HOURS"
            if [ -n "$END" ]; then ARGS="$ARGS --end $END"; fi
          else
            ARGS="--days $DAYS --interval-hours $INTERVAL_HOURS"
          fi
          python src/backfill_koda.py $ARGS

      - name: Commit static index (routes/stops cache, changes ~weekly)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/static_index.sqlite
          git diff --cached --quiet || git commit -m "Static index refresh (backfill run)"
          # See scan.yml's identical retry -- now that scan and backfill run
          # in separate concurrency groups, they can genuinely race here.
          for attempt in 1 2 3; do
            git pull --rebase origin master && git push && exit 0
            echo "push attempt $attempt failed, retrying..."
            sleep $((attempt * 5))
          done
          echo "::error::git push failed after 3 attempts"
          exit 1

      - name: Build content pages
        uses: ./.github/actions/build-content-pages
        with:
          database-url: ${{ secrets.DATABASE_URL }}
          sommarbiljett-purchased-at: ${{ secrets.SOMMARBILJETT_PURCHASED_AT }}
          supabase-anon-key: ${{ secrets.SUPABASE_ANON_KEY }}
          claim-tracking-passphrase: ${{ secrets.CLAIM_TRACKING_PASSPHRASE }}

      - uses: actions/upload-pages-artifact@v3
        with:
          path: pages_site

  deploy:
    needs: backfill
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
