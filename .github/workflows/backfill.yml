name: Backfill historical data (KoDa)

on:
  workflow_dispatch:
    inputs:
      days:
        description: "How many days back to backfill (ending yesterday)"
        default: "32"
      interval_hours:
        description: "Sampling cadence in hours, matching the live scan cadence"
        default: "2"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: skanetrafiken-scan
  cancel-in-progress: false

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Backfill from KoDa historical archive
        env:
          TRAFIKLAB_STATIC_KEY: ${{ secrets.TRAFIKLAB_STATIC_KEY }}
          KODA_API_KEY: ${{ secrets.KODA_API_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python src/backfill_koda.py --days "${{ github.event.inputs.days }}" --interval-hours "${{ github.event.inputs.interval_hours }}"

      - name: Commit static index (routes/stops cache, changes ~weekly)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/static_index.sqlite
          git diff --cached --quiet || git commit -m "Static index refresh (backfill run)"
          git push

      - name: Build dashboard
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python src/build_dashboard.py --out pages_site/index.html

      - name: Build compensation estimate page
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python src/build_compensation.py --out pages_site/compensation.html

      - name: Build reasonable claim chains page
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python src/build_claims.py --out pages_site/claims.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: pages_site

  deploy:
    needs: backfill
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
