name: Status dashboard

on:
  # Offset 7 min from scan.yml's on-the-quarter-hour */15 -- this and
  # scan.yml each curl-fetch the page(s) the other owns before deploying
  # (see build-content-pages's own note), which is a TOCTOU race if both
  # land in the same minute: whichever deploys second can publish a
  # snapshot of the other's pages that's already stale. Not aligned to the
  # same schedule makes that far less likely to actually happen, though it
  # doesn't eliminate it outright (a delayed run can still collide).
  schedule:
    - cron: "7,22,37,52 * * * *"
  workflow_dispatch: {}

permissions:
  contents: read
  actions: read
  pages: write
  id-token: write

concurrency:
  group: skanetrafiken-status
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Preserve the other pages (this workflow only rebuilds status.html)
        run: |
          mkdir -p pages_site
          for f in index.html compensation.html claims.html mileage_claims.html claim_form_template.pdf; do
            curl -sfL "https://thorstengru.github.io/SkanetrafikenForseningar/$f" -o "pages_site/$f" || echo "warning: could not fetch $f, leaving it out of this deploy"
          done

      - name: Build status dashboard
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python src/build_status.py --out pages_site/status.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: pages_site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
