name: DB usage report

on:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Report database size and per-table breakdown
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python src/db_usage_report.py
