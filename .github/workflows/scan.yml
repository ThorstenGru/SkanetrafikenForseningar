name: Scan Skånetrafiken delays

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:
    inputs:
      force_static_refresh:
        description: "Force-rebuild the static index (routes/stops/lat-lon cache) even if not stale yet"
        default: "false"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: skanetrafiken-scan
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scanner
        env:
          TRAFIKLAB_STATIC_KEY: ${{ secrets.TRAFIKLAB_STATIC_KEY }}
          TRAFIKLAB_REALTIME_KEY: ${{ secrets.TRAFIKLAB_REALTIME_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          FORCE_STATIC_REFRESH: ${{ github.event.inputs.force_static_refresh }}
        run: python src/scan.py

      - name: Commit static index (routes/stops cache, changes ~weekly)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/static_index.sqlite
          git diff --cached --quiet || git commit -m "Static index refresh: $(date -u +'%Y-%m-%d %H:%M UTC')"
          git pull --rebase origin master
          git push

      - name: Build dashboard
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python src/build_dashboard.py --out pages_site/index.html

      - name: Build compensation estimate page
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SOMMARBILJETT_PURCHASED_AT: ${{ secrets.SOMMARBILJETT_PURCHASED_AT }}
        run: python src/build_compensation.py --out pages_site/compensation.html

      - name: Build reasonable claim chains page
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          CLAIM_TRACKING_PASSPHRASE: ${{ secrets.CLAIM_TRACKING_PASSPHRASE }}
          SOMMARBILJETT_PURCHASED_AT: ${{ secrets.SOMMARBILJETT_PURCHASED_AT }}
        run: python src/build_claims.py --out pages_site/claims.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: pages_site

  deploy:
    needs: scan
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
