name: Scan Skånetrafiken delays

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:
    inputs:
      force_static_refresh:
        description: "Force-rebuild the static index (routes/stops/lat-lon cache) even if not stale yet"
        default: "false"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: skanetrafiken-scan
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    # Normal runs take ~1-2 min. Bounded so a hung Trafiklab/Supabase call
    # can't occupy this concurrency group for hours and starve every
    # scheduled run behind it -- the same class of bug already fixed once
    # for scan-vs-backfill, just scan-vs-itself this time.
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      # stop_times_cache.sqlite (every trip's full timetable, for claims.html's
      # complete-journey view) is 150+ MB -- too big to commit to git (see
      # config.py's own note), so it round-trips through actions/cache
      # instead, keyed on the committed static_index.sqlite's own hash so it
      # naturally invalidates whenever that gets refreshed (~weekly).
      - name: Restore stop_times cache
        continue-on-error: true  # a cache miss/service hiccup just means the complete-journey merge degrades gracefully, not a build failure
        uses: actions/cache/restore@v4
        with:
          path: data/stop_times_cache.sqlite
          key: stop-times-${{ hashFiles('data/static_index.sqlite') }}
          restore-keys: stop-times-

      - name: Run scanner
        env:
          TRAFIKLAB_STATIC_KEY: ${{ secrets.TRAFIKLAB_STATIC_KEY }}
          TRAFIKLAB_REALTIME_KEY: ${{ secrets.TRAFIKLAB_REALTIME_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          FORCE_STATIC_REFRESH: ${{ github.event.inputs.force_static_refresh }}
        run: python src/scan.py

      # Second, independent rail-delay source (docs/TRAFIKVERKET_INTEGRATION.md)
      # -- ingestion only, never authoritative on its own (see
      # src/trafikverket_merge.py's hard rule: this data can enrich or
      # gap-fill, never override GTFS-RT). continue-on-error because this is
      # optional infrastructure -- a Trafikverket outage or rate limit must
      # not take down the main scan/build/deploy pipeline.
      - name: Run Trafikverket scanner
        continue-on-error: true
        env:
          TRAFIKVERKET_KEY: ${{ secrets.TRAFIKVERKET_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python src/scan_trafikverket.py

      - name: Commit static index (routes/stops cache, changes ~weekly)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/static_index.sqlite
          git diff --cached --quiet || git commit -m "Static index refresh: $(date -u +'%Y-%m-%d %H:%M UTC')"
          # Retries: scan.yml and backfill.yml run in separate concurrency
          # groups on purpose (see backfill.yml's own note), so they can now
          # genuinely race on this push. A single pull+push attempt only
          # protects against a race that already happened before the pull.
          for attempt in 1 2 3; do
            git pull --rebase origin master && git push && exit 0
            echo "push attempt $attempt failed, retrying..."
            sleep $((attempt * 5))
          done
          echo "::error::git push failed after 3 attempts"
          exit 1

      - name: Build content pages
        uses: ./.github/actions/build-content-pages
        with:
          database-url: ${{ secrets.DATABASE_URL }}
          sommarbiljett-purchased-at: ${{ secrets.SOMMARBILJETT_PURCHASED_AT }}
          supabase-anon-key: ${{ secrets.SUPABASE_ANON_KEY }}
          claim-tracking-passphrase: ${{ secrets.CLAIM_TRACKING_PASSPHRASE }}

      # Re-evaluates the hash *now*, after a possible refresh above -- if
      # scan.py rebuilt the static index this run, this saves under a new
      # key reflecting the fresh timetable; otherwise the key matches what
      # was just restored and this is a harmless no-op (can't overwrite an
      # existing cache entry, nor does it need to).
      - name: Save stop_times cache
        # Never fails the job over this -- a cache save is an optimization
        # for future runs, not something this run's own success depends on
        # (and GH Actions cache keys are immutable, so re-saving under an
        # already-existing key is an expected, harmless no-op most runs).
        continue-on-error: true
        uses: actions/cache/save@v4
        with:
          path: data/stop_times_cache.sqlite
          key: stop-times-${{ hashFiles('data/static_index.sqlite') }}

      - uses: actions/upload-pages-artifact@v3
        with:
          path: pages_site

  deploy:
    needs: scan
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
