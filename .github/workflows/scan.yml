name: Scan Skånetrafiken delays

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:
    inputs:
      force_static_refresh:
        description: "Force-rebuild the static index (routes/stops/lat-lon cache) even if not stale yet"
        default: "false"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: skanetrafiken-scan
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    # Normal runs take ~1-2 min. Bounded so a hung Trafiklab/Supabase call
    # can't occupy this concurrency group for hours and starve every
    # scheduled run behind it -- the same class of bug already fixed once
    # for scan-vs-backfill, just scan-vs-itself this time.
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scanner
        env:
          TRAFIKLAB_STATIC_KEY: ${{ secrets.TRAFIKLAB_STATIC_KEY }}
          TRAFIKLAB_REALTIME_KEY: ${{ secrets.TRAFIKLAB_REALTIME_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          FORCE_STATIC_REFRESH: ${{ github.event.inputs.force_static_refresh }}
        run: python src/scan.py

      - name: Commit static index (routes/stops cache, changes ~weekly)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/static_index.sqlite
          git diff --cached --quiet || git commit -m "Static index refresh: $(date -u +'%Y-%m-%d %H:%M UTC')"
          # Retries: scan.yml and backfill.yml run in separate concurrency
          # groups on purpose (see backfill.yml's own note), so they can now
          # genuinely race on this push. A single pull+push attempt only
          # protects against a race that already happened before the pull.
          for attempt in 1 2 3; do
            git pull --rebase origin master && git push && exit 0
            echo "push attempt $attempt failed, retrying..."
            sleep $((attempt * 5))
          done
          echo "::error::git push failed after 3 attempts"
          exit 1

      - name: Build content pages
        uses: ./.github/actions/build-content-pages
        with:
          database-url: ${{ secrets.DATABASE_URL }}
          sommarbiljett-purchased-at: ${{ secrets.SOMMARBILJETT_PURCHASED_AT }}
          supabase-anon-key: ${{ secrets.SUPABASE_ANON_KEY }}
          claim-tracking-passphrase: ${{ secrets.CLAIM_TRACKING_PASSPHRASE }}

      - uses: actions/upload-pages-artifact@v3
        with:
          path: pages_site

  deploy:
    needs: scan
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
